tables:
  - table: hsc_asd_organoid_m5_DE_targets_M5_TFs
    shortLabel: asd_m5_transcription_factor_de_targets
    mediumLabel: Gordon 2026 - CRISPRi Perturbation of 26 transcription factors in ASD
    longLabel: Differentially expressed genes following perturbation of Module 5 transcription factors in ASD
    description:
      Cell-type specific differential expression following CRISPRi perturbation of 26 Module 5
      transcription factors in human stem cell-derived neural progenitors and cycling progenitors. 
      Module 5 is a co-expression gene module defined in Gordon et al. (2026) 
      that includes transcription factors implicated in neurodevelopmental regulation.
    source: "Supplementary Table 12"
    assay: perturbation
    links:
      - https://www.nature.com/articles/s41586-025-10047-5#data-availability
    categories:
      - CRISPRi perturbation
      - autism spectrum disorder
      - human cortical organoids
    organism: Homo sapiens (hiPSC-derived neural progenitors)
    organism_key: human
    in_path: supplementary_table_12_DE_targets_M5_TFs.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: target_gene
        link_table_name: Target_Gene
        species: human
        is_perturbed: false
        is_target: true
      - column_name: perturbed_gene
        link_table_name: Perturbed_Gene
        species: human
        is_perturbed: true
        is_target: false
    pvalue_column: P_Value
    fdr_column: Adjusted_P_Value
    effect_column: log2FC
    fieldLabels:
      perturbed_gene: "Gene targeted by CRISPRi gRNA in this group of cells (vs non-targeting control gRNA cells)"
      cell_type: "Cell-type cluster from scRNA-seq (NPC = neural progenitor; Cycling Progenitors = proliferating neural progenitors)"
      target_gene: "Gene whose expression was measured (one row per perturbed_gene × cell_type × target_gene)"
      avg_logfc: "Average natural-log fold change: target-gRNA cells vs non-targeting-control cells (single-cell-level)"
      target_pct: "Fraction of target-gRNA cells expressing the gene (proportion with > 0 counts)"
      ntc_pct: "Fraction of non-targeting-control cells expressing the gene"
      target_exp: "Average log-normalized expression of the gene in target-gRNA cells"
      ntc_exp: "Average log-normalized expression of the gene in non-targeting-control cells"
      p_value: "Nominal p-value from pseudobulk edgeR quasi-likelihood F-test (target vs non-targeting controls)"
      adjusted_p_value: "Benjamini–Hochberg FDR-adjusted p-value"
      de_family: "DE pipeline category (always 'pseudobulk' — counts aggregated per cell-type × replicate before testing)"
      de_method: "DE testing software (always 'edgeR')"
      de_type: "edgeR test variant (always 'QLF' = quasi-likelihood F-test)"
      log2fc: "log2 fold change: target-gRNA cells vs non-targeting-control cells (same effect as Avg_logFC, on log2 scale)"
  - table: hsc_asd_organoid_m5_DE_results
    changelog:
      - date: "2026-04-28"
        message: "Converted ENSG IDs to HGNC gene symbols. Added chromosome_name, band, gene_biotype columns."
    shortLabel: asd_organoid_de_results
    mediumLabel: Gordon 2026 - DEGs of Cortical Organoids with ASD Perturbations
    longLabel: Differential expression results across ASD genetic perturbations and developmental timepoints
    description:
      Differential expression results from bulk RNA-seq of human cortical organoids with
      ASD-associated mutations compared to controls across developmental timepoints 
      (days 25, 50, 75, 100, and all combined). Includes 9 genetic perturbations - 15q13, 16p11del, 
      16p11dup, 22q11del, 22q13del, IdiopathicASD, PCDH19, SHANK3, and Timothy syndrome.
    source: "Supplementary Table 3"
    assay: expression
    disease: ["asd", "ndd"]
    fieldLabels:
      perturbation: "ASD-associated genetic mutation modeled in the organoid (CNV labels like 16p11del/dup, 22q11del; point-mutation lines for SHANK3, PCDH19, TS=Timothy syndrome; or IdiopathicASD)"
      organoid_age_(days): "Organoid age in days post-differentiation. 'all timepoints' = meta-analysis combined across all timepoints."
      target_gene: "Gene whose expression was measured (HGNC symbol)"
      Ensembl_Gene_Id: "Ensembl gene ID"
      logFC: "log2 fold change in expression: ASD-mutation organoids vs control organoids. Pseudobulk DE via the dream (limma) mixed linear model."
      Avg_Expr: "Average log2 counts-per-million expression across all samples (TMM-normalized)"
      t: "Moderated t-statistic from the dream (limma) DE contrast"
      P-Value: "Nominal p-value from the moderated t-test"
      Adjusted_P-Value: "Benjamini–Hochberg FDR-adjusted p-value"
      z_std: "Effect-size z-score (t-statistic on the standard-normal scale; used for cross-timepoint meta-analysis via metafor)"
      chromosome_name: "Chromosome"
      band: "Cytogenetic band"
      gene_biotype: "Gene biotype"
      region_genes: "Genes within the affected CNV region (for CNV-type perturbations) or the perturbed gene itself (for single-gene perturbations like SHANK3, PCDH19, Timothy syndrome/CACNA1C). Empty for IdiopathicASD."
    links:
      - https://www.nature.com/articles/s41586-025-10047-5#data-availability
    categories:
      - bulk RNA-seq
      - differential expression
      - autism spectrum disorder
      - human cortical organoids
    organism: Homo sapiens (hiPSC-derived cortical organoids)
    organism_key: human
    in_path: supplementary_table_3_DE_results.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: target_gene
        link_table_name: gene
        species: human
        is_perturbed: false
        is_target: true
        ignore_empty: true
      - column_name: region_genes
        link_table_name: region_gene
        species: human
        is_perturbed: true
        is_target: false
        ignore_empty: true
        multi_gene_separator: ","
    pvalue_column: P-Value
    fdr_column: Adjusted_P-Value
    effect_column: logFC

