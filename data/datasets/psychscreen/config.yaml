tables:
  - table: psychscreen_age_deg
    changelog:
      - date: "2025-10-14"
        message: "Initial data load"
    shortLabel: psychscreen_age_degs
    mediumLabel: Pratt 2024 - PsychScreen Age DEGs
    longLabel: Age-related differential expression in psychiatric disorders
    description:
      Differentially expressed genes associated with aging in brain tissue from large psychiatric
      cohorts. Aggregates transcriptomic signatures across age-related comparisons.
    source: "Emani 2024 (PsychENCODE2 brainSCOPE) DEG analysis, downloaded via PsychSCREEN (Pratt 2024, psychscreen.org)"
    assay: expression
    disease: []
    links:
      - url: https://downloads.wenglab.org/Age_DEGcombined.csv
        label: Age DEGs CSV (Weng Lab)
      - url: https://psychscreen.org
        label: PsychSCREEN browser
    categories:
      - bulk RNA-seq
      - aging
      - psychiatric disorders
    organism: Homo sapiens (postmortem brain)
    organism_key: human
    in_path: Age_DEGcombined_cleaned.csv
    split_column_map: []
    separator: ","
    gene_mappings:
      - column_name: gene
        link_table_name: gene
        species: human
        perturbed_or_target: target
        # Retired-no-successor / ambiguous-prev-symbol HGNC entries
        # present across psychscreen DEG tables. Each gets a
        # manually_added=1 central_gene stub. QARS/SARS are mapped to
        # QARS1/SARS1 in preprocess.py via
        # clean_gene_column(manual_aliases=...).
        non_resolving:
          record_values:
            - GATD3B
            - IQCD
            - IQCA1
            - CRIPAK
            - U2AF1L5
            - SMC5-AS1
            - SMIM11B
            - TMEM155
            - CBSL
            - LINC00283
            - TEMN3-AS1
            - FLJ45513
            - SIK1B
            - MPP6
            - C18orf21
            - LOR
            - DUSP27
    pvalue_column: pvalue
    fdr_column: padj
    effect_column: log2FoldChange
    fieldLabels:
      gene: "Gene symbol (or Ensembl ID for unnamed transcripts)"
      basemean: "Mean of normalized read counts across all donors"
      log2foldchange: "log2 fold change in expression: old (70–90y) vs young (25–70y) healthy donors. Positive = upregulated in old. Pseudobulk DESeq2 (likelihood-ratio test) per cell type."
      lfcse: "Standard error of the log2 fold change"
      stat: "Likelihood-ratio test statistic for the old-vs-young contrast"
      pvalue: "Nominal p-value from the DESeq2 likelihood-ratio test"
      padj: "Benjamini–Hochberg FDR-adjusted p-value"
      cell_type: "Brain cell type from snRNA-seq clustering (cortical neurons and glia)"
