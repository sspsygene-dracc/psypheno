tables:
  - table: mouse_perturb_deg
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
    shortLabel: 4tf_perturb_seq_degs
    mediumLabel: Zheng 2024 - 4TF Perturb-seq DEGs
    longLabel: Differential expression from in vivo Perturb-seq of four transcription factors
    description:
      Cell-type-specific differential expression results from massively parallel in vivo Perturb-seq
      targeting Foxg1, Nr2f1, Tbr1, and Tcf4 in developing mouse cortex. Captures transcriptional changes
      across excitatory and inhibitory neuron subtypes.
    source: "Table S8"
    assay: perturbation
    fieldLabels:
      gene: "Mouse gene symbol (MGI)"
      logfc: "log2 fold change in expression: target-gRNA cells vs non-targeting-control cells. Positive = upregulated when perturbed. Computed by edgeR pseudobulk likelihood-ratio test per cell type."
      logcpm: "Average log2 counts-per-million expression of the gene across cells (edgeR scale)"
      lr: "Likelihood-ratio test statistic (edgeR glmLRT)"
      pvalue: "Nominal p-value from the edgeR likelihood-ratio test"
      padj: "Benjamini–Hochberg FDR-adjusted p-value"
      cell_type: "Cell-type cluster from scRNA-seq of developing mouse cortex (excitatory and inhibitory neuron subtypes; glia)"
      perturbation: "CRISPR perturbation identifier (target gene name + replicate index, e.g. Foxg1_1; NonTarget1/SafeTarget for controls)"
    links:
      - url: https://www.cell.com/cms/10.1016/j.cell.2024.04.050/attachment/c784afac-cbc4-481b-bbcd-3a6d00aa267b/mmc4.xlsx
        label: Supplementary Table S8 (mmc4.xlsx)
    categories:
      - in vivo Perturb-seq
      - transcription factors
      - cortical development
    organism: Mus musculus (embryonic cortex)
    organism_key: mouse
    in_path: deg.txt
    split_column_map:
      - source_col: perturbation
        new_col1: _perturbation_gene
        new_col2: _perturbation_gene_idx
        sep: _
    separator: "\t"
    gene_mappings:
      - column_name: Gene
        link_table_name: gene
        species: mouse
        perturbed_or_target: target
      - column_name: _perturbation_gene
        link_table_name: perturbation_gene
        species: mouse
        ignore_missing:
          - NonTarget1
          - SafeTarget
        perturbed_or_target: perturbed
    pvalue_column: PValue
    fdr_column: padj
    effect_column: logFC
  - table: mouse_perturb_clusterprop
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
    shortLabel: 4tf_cell_proportion_changes
    mediumLabel: Zheng 2024 - 4TF Cell Proportion Changes
    longLabel: Cell type proportion shifts from transcription factor perturbations
    description:
      Quantification of cell type and subcluster abundance changes resulting from CRISPR perturbations
      of four neurodevelopmental transcription factors in mouse cortex, revealing cell fate specification
      effects.
    source: "Table S8"
    assay: perturbation
    fieldLabels:
      subcluster: "Cell-subcluster identity from scRNA-seq clustering of developing mouse cortex"
      guide: "gRNA identifier (target gene name + replicate index, e.g. Foxg1_1; NonTarget1/SafeTarget/GFP for controls)"
      propmean_treatnontarget2: "Mean fraction of cells in the non-targeting-control condition (NonTarget2 gRNA) belonging to this subcluster, averaged across replicates"
      propmean_treatguide: "Mean fraction of cells in the target-gRNA condition belonging to this subcluster, averaged across replicates"
      propratio: "Ratio of cell-fraction means: target-gRNA / non-targeting control. >1 = subcluster expanded under perturbation; <1 = subcluster reduced."
      limma_coef: "limma model coefficient: effect of perturbation on the cell-fraction in this subcluster"
      tstatistic: "Moderated t-statistic from the limma test (target-gRNA vs non-targeting control)"
      p_value: "Nominal p-value from the limma moderated t-test"
      fdr: "Benjamini–Hochberg FDR-adjusted p-value"
    links:
      - url: https://www.cell.com/cms/10.1016/j.cell.2024.04.050/attachment/c784afac-cbc4-481b-bbcd-3a6d00aa267b/mmc4.xlsx
        label: Supplementary Table S8 (mmc4.xlsx)
    categories:
      - in vivo Perturb-seq
      - cell fate
      - cortical development
    organism: Mus musculus (embryonic cortex)
    organism_key: mouse
    in_path: clusterprop.txt
    split_column_map:
      - source_col: guide
        new_col1: _guide_gene
        new_col2: _guide_gene_idx
        sep: _
    separator: "\t"
    gene_mappings:
      - column_name: _guide_gene
        link_table_name: guide_gene
        species: mouse
        ignore_missing:
          - NonTarget1
          - SafeTarget
          - GFP
        perturbed_or_target: perturbed
    pvalue_column: P.Value
    fdr_column: FDR
    effect_column: limma_coef
