tables:
  - table: genetrek_pasteur
    shortLabel: genetrek_pasteur
    mediumLabel: "Rolland 2023 - GeneTrek Curated Per-Gene Autism OR + NDD Annotations"
    longLabel: "Per-gene autism odds ratio plus aggregated NDD-relevant gene-list memberships from the GeneTrek knowledgebase (Bourgeron lab, Institut Pasteur)"
    description: >
      Per-gene table from https://genetrek.pasteur.fr (Bourgeron lab,
      Institut Pasteur). Combines the autism odds ratio + p-value + 95%
      CI from Rolland et al. Nat Med 2023 with boolean memberships in
      ~30 published NDD/autism gene lists (SFARI 1/23S, SPARK, SysNDD,
      DBD, DDg2p, Genomics England panels, Epifactors, Haploinsufficient
      / Triplosensitive, BrainSpan pre/postbirth, gnomAD constraint,
      etc.) and inheritance / score annotations (pLI, LOEUF, MOEUF,
      EAGLE, NCI/CI). The hg19 / hg38 coordinate columns from the
      GeneTrek export are dropped at preprocess time — SSPsyGene is
      gene-centric.
    source: "GeneTrek TSV export (snapshot 2024-04-26), manually downloaded from genetrek.pasteur.fr"
    in_path: genetrek_pasteur_cleaned.tsv
    separator: "\t"
    organism: "Homo sapiens"
    organism_key: human
    assay: curated
    disease:
      - asd
      - ndd
    categories:
      - curated database
      - autism genetics
      - NDD gene lists
      - genetic constraint metrics
    links:
      - url: https://genetrek.pasteur.fr/
        label: GeneTrek (Bourgeron lab)
        description: Source of the aggregated per-gene annotations and gene-list memberships.
      - url: https://www.nature.com/articles/s41591-023-02408-2
        label: Rolland 2023 — Nature Medicine (autism OR source)
    pvalue_column: autism_or_pvalue
    effect_column: autism_or
    fieldLabels:
      gene_symbol: "HGNC gene symbol (resolved at preprocess time; raw value preserved in gene_symbol_raw)"
      ncbi_id: "NCBI Gene ID"
      ensembl_id: "Ensembl gene ID"
      hgnc_id: "HGNC numeric ID"
      omim_id: "OMIM identifier (where annotated)"
      gene_type: "Gene biotype (protein-coding, pseudogene, lincRNA, etc.)"
      autism_or: "Autism odds ratio for rare LoF carrier prevalence in autistic vs. control individuals (Rolland et al. 2023)"
      autism_or_pvalue: "P-value for the autism odds ratio (Rolland et al. 2023)"
      autism_or_ci_lower: "Lower bound of the 95% confidence interval for the autism odds ratio"
      autism_or_ci_upper: "Upper bound of the 95% confidence interval for the autism odds ratio"
      prevalence_autism: "Carrier prevalence among autistic individuals in the Rolland et al. 2023 cohorts"
      prevalence_controls: "Carrier prevalence among control individuals in the Rolland et al. 2023 cohorts"
      n_carriers_autism: "Number of autistic individuals carrying a qualifying variant in this gene"
      pli: "gnomAD v2.1.1 probability of LoF intolerance (Lek et al. 2016)"
      loeuf: "gnomAD LoF Observed/Expected Upper bound Fraction (lower = more LoF-constrained)"
      moeuf: "gnomAD missense Observed/Expected Upper bound Fraction (lower = more missense-constrained)"
      eagle_score_from_sfari_website: "EAGLE composite score for autism evidence (sourced from the SFARI website)"
      autism_associated_genes_or_constrained_genes: "Categorical: whether the gene is autism-associated, constrained-only, or 'not applicable'"
      nci_ci_categories_from_spark_iwes_v1: "Non-carrier-Index / Carrier-Index categories from SPARK iWES v1"
      inheritance_type_combined_v3: "Combined inheritance pattern (AD/AR/X-linked/etc.) integrated across DDg2p and SysNDD"
      ddg2p_inheritance_cognition_brain_genes_updated_2024_01_10_: "Inheritance pattern from DDg2p, Cognition|brain panel"
      sysndd_inheritance_updated_2023_11_09_: "Inheritance pattern from SysNDD"
      autism_dd_categories_from_fu_et_al_nat_genet_2022_pmid_35982160_: "Autism / Developmental-Delay categorization from Fu et al. 2022 (PMID 35982160)"
      autism_dd_categories_from_wang_et_al_pnas_2022_pmid_36350923_: "Autism / Developmental-Delay categorization from Wang et al. 2022 (PMID 36350923)"
      high_confidence_autism_genes_from_zhou_et_al_nat_genet_2022_pmid_35982159_: "Boolean: high-confidence autism gene per Zhou et al. 2022 (PMID 35982159)"
    gene_mappings:
      - column_name: gene_symbol
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
    changelog:
      - date: "2026-05-07"
        message: "Initial data load from GeneTrek TSV snapshot 2024-04-26."
