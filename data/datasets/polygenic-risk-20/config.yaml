tables:
  - table: SCZ_Risk_Arrayed_RNAseq_supp_1
    shortLabel: scz_risk_arrayed_bulk_rnaseq
    mediumLabel: "Deans 2026 - arrayed CRISPRa/shRNA ECCITE-seq in iGLUT Neurons"
    longLabel: Polygenic risk for schizophrenia -arrayed assay perturbation on CALN1 CLCN3 CUL9 DOC2A FURIN GATAD2A INO80E PCCB PLCL1 SF3B1 SNAP91 SNCA THOC7 TMEM219 TSNARE1 ZNF823
    description:
        "This data shows effects of arrayed perturbation data fromn bulk RNA-seq DEG tables
        from the paper's supplemental spreadsheet 1 (sheets 2-8, 15, 16, 35-37, 41-44)
        for CRISPa/RNAi on 16 genes: CALN1 CLCN3 CUL9 DOC2A FURIN GATAD2A INO80E
        PCCB PLCL1 SF3B1 SNAP91 SNCA THOC7 TMEM219 TSNARE1 ZNF823"
    categories:
      - bulk RNA-seq
      - iPSC-derived neurons
      - NGN2 induction
      - CRISPRa and RNAi knockout
    assay: perturbation
    disease: ["scz", "ndd"]
    pvalue_column: P.Value
    fdr_column: adj.P.Val
    effect_column: logFC
    organism: Homo sapiens (iPSC-derived neurons)
    organism_key: human
    in_path: Supp_1_all_cleaned.csv
    separator: ","
    split_column_map: []
    gene_mappings:
      - column_name: target_gene
        link_table_name: Target_Gene
        species: human
        perturbed_or_target: target
        # Retired-no-successor / ambiguous-prev-symbol HGNC entries
        # across Supp_1 + Supp_2. Each gets a manually_added=1
        # central_gene stub. NOV/MUM1/SARS/QARS/TAZ are mapped to
        # CCN3/PWWP3A/SARS1/QARS1/TAFAZZIN in preprocess.py via
        # clean_gene_column(manual_aliases=...).
        non_resolving:
          record_values:
            - GATD3B
            - IQCD
            - IQCA1
            - CRIPAK
            - U2AF1L5
            - SMC5-AS1
            - OCLM
            - SMIM11B
            - TMEM155
            - ABALON
            - SIK1B
            - MPP6
            - C18orf21
            - SGK494
      - column_name: perturbed_gene
        link_table_name: Perturbed_Gene
        species: human
        perturbed_or_target: perturbed
    fieldLabels:
      perturbed_gene: "Gene targeted by CRISPRa or shRNA in this sample (compared to scramble non-targeting controls)"
      target_gene: "Gene whose expression was measured (one row per gene)"
      description: "Gene annotation/description from HGNC/Ensembl"
      logfc: "log2 fold change in expression, perturbed vs. scramble control. Positive = upregulated when perturbed."
      ci_l: "Lower bound of the 95% confidence interval on the log2 fold change"
      ci_r: "Upper bound of the 95% confidence interval on the log2 fold change"
      aveexpr: "Average log2 expression of the gene across all bulk RNA-seq samples"
      t: "Moderated t-statistic for the perturbed-vs-scramble contrast"
      p_value: "Nominal p-value from the moderated t-test"
      adj_p_val: "Benjamini–Hochberg FDR-adjusted p-value"
      b: "Log-odds that the gene is differentially expressed"
  - table: SCZ_Risk_Pooled_ECCITEseq_supp_2
    shortLabel: scz_risk_pooled_eccite_seq
    mediumLabel: "Deans 2026 - pooled CRISPRa/shRNA ECCITE-seq in iGLUT Neurons"
    longLabel: Polygenic risk for schizophrenia - pooled assay perturbation on CALN1 CLCN3 FES NAGA PLCL1 SF3B1 TMEM219 UBE2Q2L ZNF804A ZNF823
    description:
        "This data shows effects of pooled ECCITE-seq assays (Target vs. Scramble DEGs)
        from the paper's supplemental spreadsheet 2 for 10 genes:
        CALN1 CLCN3 FES NAGA PLCL1 SF3B1 TMEM219 UBE2Q2L ZNF804A ZNF823"
    categories:
      - ECCITE-seq
      - iPSC-derived neurons
      - NGN2 induction
      - CRISPRa and RNAi knockout
    assay: perturbation
    disease: ["scz", "ndd"]
    pvalue_column: pval
    fdr_column: padj
    effect_column: logFC
    organism: Homo sapiens (iPSC-derived neurons)
    organism_key: human
    in_path: Supp_2_all_cleaned.csv
    separator: ","
    split_column_map: []
    gene_mappings:
      - column_name: target_gene
        link_table_name: Target_Gene
        species: human
        perturbed_or_target: target
        # Retired-no-successor / ambiguous-prev-symbol HGNC entries
        # across Supp_1 + Supp_2. Each gets a manually_added=1
        # central_gene stub. NOV/MUM1/SARS/QARS/TAZ are mapped to
        # CCN3/PWWP3A/SARS1/QARS1/TAFAZZIN in preprocess.py via
        # clean_gene_column(manual_aliases=...).
        non_resolving:
          record_values:
            - GATD3B
            - IQCD
            - IQCA1
            - CRIPAK
            - U2AF1L5
            - SMC5-AS1
            - OCLM
            - SMIM11B
            - TMEM155
            - ABALON
            - SIK1B
            - MPP6
            - C18orf21
            - SGK494
      - column_name: perturbed_gene
        link_table_name: Perturbed_Gene
        species: human
        perturbed_or_target: perturbed
    fieldLabels:
      perturbed_gene: "Gene targeted by the gRNA carried by these single cells (compared to scramble non-targeting cells)"
      target_gene: "Gene whose expression was measured (one row per gene)"
      avgexpr: "Average log-normalized expression of the gene in the perturbed group of cells"
      logfc: "Log fold change in expression, perturbed cells vs. scramble cells. Positive = upregulated when perturbed."
      statistic: "Wilcoxon rank-sum (Mann–Whitney U) test statistic"
      auc: "Area under the ROC curve from the Wilcoxon test; 1.0 = perfect marker of perturbed cells, 0.5 = no discrimination"
      pval: "Nominal p-value from the Wilcoxon rank-sum test"
      padj: "Benjamini–Hochberg FDR-adjusted p-value"
      pct_in: "Percent of perturbed cells (target gRNA group) expressing the gene"
      pct_out: "Percent of scramble (non-targeting) control cells expressing the gene"
