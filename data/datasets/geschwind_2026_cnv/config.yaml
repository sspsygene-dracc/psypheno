tables:
  - table: geschwind_2026_cnv_de
    changelog:
      - date: "2026-02-25"
        message: "Initial data load"
    shortLabel: "asd_cnv_de_results"
    mediumLabel: "ASD CNV DE Results"
    longLabel: "Differential expression across ASD-associated CNV deletions and mutations"
    description: >
      Genome-wide differential expression results for 9 ASD-associated genetic forms
      (15q13.3 del, 16p11.2 del/dup, 22q11.2 del, 22q13.3 del, PCDH19, SHANK3,
      Timothy syndrome, idiopathic ASD) in iPSC-derived cortical organoids at Day 25,
      50, 75, 100 and combined across all timepoints. The region_genes column lists
      genes encompassed by each structural variant.
    source: "Supplementary Table 3 (all 45 sheets)"
    assay: expression
    disease: ["asd", "ndd"]
    fieldLabels:
      sheet: "Source sheet identifier encoding ASD form + organoid timepoint (e.g. 16p11del_100 = 16p11.2 deletion at day 100; 'all_timepoints' = combined across days)"
      ensembl_gene_id: "Ensembl gene ID for the measured gene"
      hgnc_symbol: "Gene symbol (HGNC)"
      logfc: "log2 fold change in expression: ASD-mutation organoids vs control organoids. Pseudobulk DE via the dream (limma) mixed linear model."
      aveexpr: "Average log2 counts-per-million expression across all samples (TMM-normalized)"
      t: "Moderated t-statistic from the dream (limma) DE contrast"
      p: "Nominal p-value from the moderated t-test"
      fdr: "Benjamini–Hochberg FDR-adjusted p-value"
      z_std: "Effect-size z-score (t-statistic on the standard-normal scale; used for cross-timepoint meta-analysis via metafor)"
      chromosome_name: "Chromosome (autosome number, X, Y, or MT) where the gene is located"
      band: "Cytogenetic band of the gene's location"
      strand: "Genomic strand of the gene (+1 = forward, −1 = reverse)"
      start_position: "Gene start coordinate on the chromosome (GRCh38/hg38 — GENCODE v25, Ensembl release 85)"
      end_position: "Gene end coordinate on the chromosome (GRCh38/hg38 — GENCODE v25, Ensembl release 85)"
      gene_biotype: "Ensembl gene biotype classification (e.g. protein_coding, lncRNA, miRNA, pseudogene)"
      region_genes: "Genes within the affected CNV region (for CNV-type perturbations) or the perturbed gene itself (for single-gene perturbations like SHANK3, PCDH19, Timothy syndrome). Empty for IdiopathicASD."
    links:
      - https://www.nature.com/articles/s41586-025-10047-5#data-availability
    categories:
      - ASD
      - CNV deletion
      - cortical organoids
      - developmental transcriptomics
    organism: "Homo sapiens (iPSC-derived cortical organoids)"
    organism_key: human
    in_path: de_results.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: hgnc_symbol
        link_table_name: gene
        species: human
        is_perturbed: false
        is_target: true
        ignore_empty: true
      - column_name: region_genes
        link_table_name: region_gene
        species: human
        is_perturbed: true
        is_target: false
        ignore_empty: true
        multi_gene_separator: ","
    pvalue_column: p
    fdr_column: fdr
    effect_column: logFC
