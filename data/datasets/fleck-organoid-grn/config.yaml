tables:
  - table: fleck_2023_organoid_grn
    shortLabel: fleck_2023_organoid_grn
    mediumLabel: "Fleck 2023 - Pando-Inferred TF Regulatory Network in Brain Organoids"
    longLabel: "Pando-inferred transcription-factor → target gene regulatory edges from human brain organoid snRNA-seq + scATAC-seq (Fleck et al. 2023)"
    description: >
      TF → target regulatory edges inferred by Pando from multi-omic
      (snRNA-seq + scATAC-seq) profiling of human brain organoids derived
      from the H9 hESC and 409B2 hiPSC lines. Each row is one inferred edge
      with the regression estimate (effect of TF on target expression),
      supporting peak count, p-value, FDR-adjusted p-value, and
      gene-expression correlation. From the grn_modules.tsv table on
      Zenodo record 5242913.
    source: "Zenodo record 5242913 — grn_modules.tsv"
    in_path: fleck_organoid_grn_modules.tsv
    separator: "\t"
    organism: "Homo sapiens (brain organoids; H9 hESC + 409B2 hiPSC)"
    organism_key: human
    assay: perturbation
    condition: []
    categories:
      - GRN inference
      - brain organoids
      - single-cell multiomic
      - TF-target regulatory edges
    links:
      - url: https://zenodo.org/records/5242913
        label: Zenodo — record 5242913 (raw data)
        description: Includes seurat_objects.tar.gz (~18 GB) and the demuxed VCF — not ingested here.
      - url: https://github.com/quadbio/Pando
        label: Pando (GRN inference tool used)
    pvalue_column: pval
    fdr_column: padj
    effect_column: estimate
    fieldLabels:
      tf: "Transcription factor — the upstream regulator in the inferred edge. HGNC symbol (resolved at preprocess time; original value in tf_raw)."
      target: "Target gene — the gene whose expression is associated with the TF in the regression. HGNC symbol (resolved at preprocess time; original value in target_raw)."
      estimate: "Pando GLM regression coefficient for the TF→target edge: positive = activating, negative = repressing (Fleck et al. 2023, Methods / Fig 2a). Magnitude reflects the change in target expression per unit TF activity, on the scale of log-transformed counts."
      npeaks: "Number of TF-binding chromatin peaks (motif-matched, accessible CREs) supporting this edge in the snRNA-seq + scATAC-seq integration."
      ngenes: "Number of distinct target genes this TF regulates in the inferred network — TF-level total, constant across all rows for the same TF."
      ntfs: "Number of distinct TFs inferred to regulate this target gene — target-level total, constant across all rows for the same target."
      peaks: "Comma-separated list of supporting chromatin peaks in chrN_start_end format (hg38 coordinates)."
      pval: "P-value for the regression coefficient (TF→target edge significance) from the Pando GLM."
      padj: "Benjamini-Hochberg FDR-adjusted p-value."
      corr: "Pearson correlation coefficient between TF and target gene expression across single cells in the dataset (signed, range −1 to 1)."
      log_padj: "−log10(padj), pre-computed from the padj column for convenience."
    gene_mappings:
      - column_name: tf
        link_table_name: tf
        species: human
        perturbed_or_target: perturbed
      - column_name: target
        link_table_name: gene
        species: human
        perturbed_or_target: target
    changelog:
      - date: "2026-05-07"
        message: "Initial data load from Zenodo record 5242913."
