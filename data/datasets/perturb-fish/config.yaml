tables:
  - table: perturb_fish_astro
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
      - date: "2026-05-04"
        message: "Declare effect_column: lfc so the table contributes to up/down combined-p groups (#74)"
      - date: "2026-05-05"
        message: "Standardized title and added paper-tailored column tooltips."
    shortLabel: perturb_fish_astrocyte_screen
    mediumLabel: Binan 2025 - Perturb-FISH CRISPRi Screen of 127 ASD Genes in iPSC Astrocytes
    longLabel: CRISPR screening with spatial transcriptomics in astrocytes
    description:
      Spatial transcriptomics and functional calcium imaging screen of 127 autism spectrum disorder
      risk genes in human iPSC-derived astrocytes. Combines Perturb-FISH with ATP-stimulated calcium activity
      phenotypes to link genetic perturbations with transcriptional and functional profiles.
    source: "Extracted from supplemental LFC and q-value matrices"
    fieldLabels:
      perturbgene: "Gene targeted by CRISPRi knockdown in this row (vs non-targeting control gRNA cells)"
      gene: "Gene whose expression was measured (one row per perturbation × measured gene)"
      lfc: "Natural-log fold change in expression, perturbed vs non-targeting control cells. Positive = upregulated when perturbed. Computed by FR-Perturb."
      qval: "FDR-adjusted p-value (Benjamini–Hochberg) from 10,000 permutations of the perturbation labels"
    assay:
      - spatial
      - perturbation
    disease: ["asd", "ndd"]
    links:
      - url: https://download.brainimagelibrary.org/0c/bd/0cbd479c521afff9/astrocytes/processed/finaltables/
        label: BIL — processed final tables
        description: Brain Image Library; processed LFC and q-value matrices
      - url: https://dx.doi.org/10.17504/protocols.io.6qpvr356bvmk/v1
        label: Perturb-FISH protocol
        description: protocols.io wet-lab procedure
      - url: https://github.com/lbinan/Perturb-FISH
        label: GitHub — Perturb-FISH
      - url: https://github.com/douglasyao/FR-Perturb
        label: GitHub — FR-Perturb
      - url: https://api.brainimagelibrary.org/web/view?bildid=ace-gem-get
        label: BIL landing page
      - url: https://download.brainimagelibrary.org/0c/bd/0cbd479c521afff9/
        label: BIL data directory
        description: Full raw imaging dataset directory
      - url: https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE221321
        label: GEO — GSE221321
    categories:
      - spatial transcriptomics
      - CRISPR screening
      - astrocyte function
      - autism genetics
    organism: Homo sapiens (iPSC-derived astrocytes)
    organism_key: human
    in_path: perturbfish-astro.csv
    separator: "\t"
    gene_mappings:
      - column_name: perturbGene
        link_table_name: perturbGene
        comment: human iPSC-derived astrocyte dataset
        species: human
        perturbed_or_target: perturbed
        non_resolving:
