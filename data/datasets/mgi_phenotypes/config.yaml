    - Cynthia L Smith
    - Martin Ringwald
    - Joel E Richardson
    - Carol J Bult
  year: 2024
  journal: Genetics
  doi: 10.1093/genetics/iyae031
  pmid: "38531069"
  sspsygene_grants: []
maintainers:
  - name: Johannes Birgmeier
    email: jbirgmei@ucsc.edu
