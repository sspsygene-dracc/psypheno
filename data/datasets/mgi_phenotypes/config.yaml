tables:
  - table: mgi_high_level_phenotypes
    changelog:
      - date: "2025-10-27"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title and narrowed scope to match the ingested artifact, resolved Ensembl IDs to HGNC symbols at preprocess time, added column tooltips and a /gene-parser link tooltip."
    shortLabel: mgi_phenotype_annotations
    mediumLabel: Baldarelli 2024 - Allele-level Mammalian Phenotype Ontology Annotations (MGI)
    longLabel: Mouse Genome Informatics phenotypic allele annotations
    description:
      Curated phenotypic annotations for mouse mutant alleles from MGI, mapping Mammalian Phenotype
      Ontology terms to Ensembl mouse genes. Provides organism-level phenotypes for genetic perturbations.
    source: "MGI Phenotypic Allele Report (informatics.jax.org)"
    assay: phenotype
    fieldLabels:
      mgi_allele_accession_id: "MGI accession ID for the allele"
      allele_symbol: "Standard allele symbol notation"
      allele_name: "Human-readable name of the allele"
      marker_symbol: "Mouse gene marker symbol (MGI)"
      marker_name: "Human-readable name of the gene marker"
      high_level_mammalian_phenotype_names_comma_delimited_: "Top-level Mammalian Phenotype ontology terms"
      allele_type: "Type of allele (targeted, gene trap, endonuclease-mediated, etc.)"
      allele_attribute: "Allele attributes (null/knockout, conditional ready, etc.)"
      pubmed_id_for_original_reference: "PubMed ID of the original publication"
      mgi_marker_accession_id: "MGI accession ID for the gene marker"
      marker_refseq_id: "RefSeq gene ID"
      marker_ensembl_id: "Mouse symbol resolved from Marker Ensembl ID (raw ID in marker_ensembl_id_raw)"
      marker_ensembl_id_raw: "Original Ensembl gene ID (pre-resolution)"
      high_level_mammalian_phenotype_id_comma_delimited_: "MP ontology term IDs"
      synonyms_delimited_: "Gene/allele synonyms"
    links:
      - url: https://www.informatics.jax.org
        label: MGI — Mouse Genome Informatics
      - url: https://www.informatics.jax.org/downloads/reports/MGI_PhenotypicAllele.rpt
        label: MGI Phenotypic Allele Report (.rpt)
    categories:
      - phenotype ontology
      - model organism
      - curated database
    organism: Mus musculus
    organism_key: mouse
    in_path: MGI_PhenotypicAllele_cleaned.rpt
    separator: "\t"
    gene_mappings:
      - column_name: Marker Ensembl ID
        link_table_name: gene
        species: mouse
        ignore_empty: true
        perturbed_or_target: perturbed
