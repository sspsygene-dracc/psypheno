fieldLabels:
  p_value: "P-value"
  pvalue: "Nominal p-value"
  padj: "BH-adjusted p-value"
  fdr: "False discovery rate (adjusted p-value)"
  qval: "Q-value (FDR-adjusted p-value)"
  logfc: "Log fold change"
  lfc: "Log fold change"
  log2foldchange: "Log2 fold change"
  log2_fold_change: "Log2 fold change"
  basemean: "Mean of normalized counts (DESeq2)"
  lfcse: "Log fold change standard error"
  stat: "Wald test statistic (DESeq2)"
  cell_type: "Brain cell type"

assayTypes:
  expression: "Gene Expression (RNA-seq)"
  spatial: "Spatial Transcriptomics"
  behavior: "Behavioral Assays"
  perturbation: "Perturbation Screen"
  perturbation_deg: "Perturbation Differential Expression (DEG)"
  curated: "Curated Database"
  phenotype: "Phenotype Annotation"

# Assay types whose per-study p-values are comparable enough to combine in the
# cross-study meta-analysis (/most-significant). Restricting the combination to
# differential-expression assays keeps the combined ranking interpretable and
# stable as non-DEG datasets (GRN edges, cell-proportion shifts, curated lists)
# are added. See psypheno issue #187. The `perturbation_deg` assay is the subset
# of perturbation screens that report genuine per-gene differential expression
# (Perturb-seq / ECCITE-seq / bulk-RNA DEGs), as opposed to GRN inference or
# cell-type abundance shifts, which stay tagged `perturbation`.
metaAnalysisAssays:
  - expression
  - perturbation_deg

conditionTypes:
  autism: "Autism"
  scz: "Schizophrenia"
  bipolar: "Bipolar Disorder"
  ndc: "Neurodevelopmental Conditions"

organismTypes:
  human: "Human"
  mouse: "Mouse"
  zebrafish: "Zebrafish"
