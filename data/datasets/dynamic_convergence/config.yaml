tables:
  - table: dynamic_convergence_S2
    changelog:
      - date: "2025-11-07"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title to first-author/year/assay/medium format, added column tooltips, and updated paper reference now that the Nature Neuroscience version is out."
    shortLabel: meta_degs_ndd_convergence
    mediumLabel: Fernandez Garcia 2026 - Meta-DEGs across 29 NDD Perturbations in hiPSC NPCs and Neurons
    longLabel: Meta-analysis of convergent NDD risk gene effects across development
    description:
      Meta-differentially expressed genes showing convergent transcriptional effects across 29
      neurodevelopmental disorder risk genes in neural progenitors, glutamatergic neurons, and GABAergic
      neurons. Integrates effect sizes and significance across cell types and developmental stages.
    source: "Supplemental Data 2"
    assay: perturbation
    disease: ["ndd"]
    fieldLabels:
      markername: "Gene symbol (the 'marker name' in METAL terminology)"
      weight: "Sum of per-study sample sizes contributing to the meta-analysis (METAL weight)"
      zscore: "Combined effect-size Z-score from METAL z-score-based meta-analysis across the contributing studies"
      p_value: "Meta-analysis p-value (two-sided, from the combined Z-score)"
      direction: "Per-study direction of effect: one character per contributing study (+ = up, − = down, ? = missing)"
      hetisq: "I² heterogeneity statistic — percent of total variance attributable to between-study heterogeneity (0–100%)"
      hetchisq: "Cochran's Q heterogeneity chi-square statistic"
      hetdf: "Degrees of freedom for the heterogeneity test (= number of contributing studies − 1)"
      hetpval: "Heterogeneity p-value (Cochran's Q test)"
    links:
      - url: https://www.biorxiv.org/content/10.1101/2024.08.23.609190v4.supplementary-material
        label: bioRxiv preprint supplement
      - url: https://www.nature.com/articles/s41593-026-02247-7#Sec47
        label: Nature Neuroscience — supplementary data
    categories:
      - meta-analysis
      - CRISPR perturbation
      - developmental transcriptomics
    organism: Homo sapiens (hiPSC-derived neurons)
    organism_key: human
    in_path: Supplemental_Data_2(META_DEGs)_cleaned.csv
    separator: ","
    gene_mappings:
      - column_name: MarkerName
        link_table_name: gene
        species: human
        perturbed_or_target: target
        # Retired-no-successor / ambiguous-prev-symbol HGNC entries
        # appearing in Supplemental_Data_2. Each gets a manually_added=1
        # central_gene stub and the load-db warning is silenced.
        # NOV/QARS/MUM1/TAZ/SARS are handled in preprocess.py via
        # clean_gene_column(manual_aliases=...) since they have known
        # canonical successors (CCN3 / QARS1 / PWWP3A / TAFAZZIN /
        # SARS1) for this NDD context.
        non_resolving:
          record_values:
            - GATD3B
            - IQCD
            - IQCA1
            - U2AF1L5
            - SMIM11B
            - ABALON
            - SIK1B
            - C18orf21
            - SGK494
            - MPP6
    pvalue_column: P-value
    effect_column: Zscore
  - table: Perturbed_Baseline_behavior_pvalues
    changelog:
      - date: "2026-02-17"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title, expanded source description per Catharina's wrangler-meeting feedback, added column tooltips, and updated paper reference to the published Nature Neuroscience version."
    shortLabel: mutant_behavior_fingerprints
    mediumLabel: Fernandez Garcia 2026 - Behavioral Fingerprints of NDD Mutant and Crispant Zebrafish
    source: "Supplemental Data 3 download media-5.xlsx ; log10(pvalue) Baseline comparison behaviors of stable mutant to background-matched wild-type fish"
    longLabel: Mutant zebrafish baseline behavioral fingerprint pvalues
    description:
      Comparing behaviors in stable mutant and background-matched wild-type fish pvalues.
      Mutant behavioral fingerprint across startle-OFF, startle-ON, and sleep-wake parameters.
    links:
      - url: https://www.biorxiv.org/content/10.1101/2024.08.23.609190v4.supplementary-material
        label: bioRxiv preprint supplement
      - url: https://www.nature.com/articles/s41593-026-02247-7#Sec47
        label: Nature Neuroscience — supplementary data
    categories:
      - mutant zebrafish
      - behavioral fingerprints
    assay: behavior
    disease: ["ndd"]
    fieldLabels:
       human_gene_name: "Human ortholog gene symbol (the NDD risk gene whose zebrafish ortholog was mutated)"
       zebrafish_mutant: "Zebrafish mutant line/allele (hom = homozygous mutant; crispant = F0 CRISPR-injected)"
       activityd: "Daytime activity — signed −log10(p) from LMM (mutant vs WT; positive = higher in mutant)"
       activityn: "Nighttime activity — signed −log10(p) from LMM (mutant vs WT; positive = higher in mutant)"
       wakingactivityd: "Daytime waking activity (activity while awake) — signed −log10(p) from LMM (mutant vs WT)"
       wakingactivityn: "Nighttime waking activity (activity while awake) — signed −log10(p) from LMM (mutant vs WT)"
       restboutd: "Daytime sleep-bout count — signed −log10(p) from LMM (mutant vs WT; positive = more bouts in mutant)"
       restboutn: "Nighttime sleep-bout count — signed −log10(p) from LMM (mutant vs WT; positive = more bouts in mutant)"
       sleeplatencyd: "Daytime sleep latency — signed −log10(p) from LMM (mutant vs WT; positive = longer latency in mutant)"
       sleeplatencyn: "Nighttime sleep latency — signed −log10(p) from LMM (mutant vs WT; positive = longer latency in mutant)"
       sleeplengthd: "Daytime sleep-bout length — signed −log10(p) from LMM (mutant vs WT; positive = longer bouts in mutant)"
       sleeplengthn: "Nighttime sleep-bout length — signed −log10(p) from LMM (mutant vs WT; positive = longer bouts in mutant)"
       sleepd: "Total daytime sleep — signed −log10(p) from LMM (mutant vs WT; positive = more sleep in mutant)"
       sleepn: "Total nighttime sleep — signed −log10(p) from LMM (mutant vs WT; positive = more sleep in mutant)"
       on_avg_stim: "Visual-startle (lights-on): average response across all 5 stimuli — signed −log10(p) (mutant vs WT)"
       on_avg_post: "Visual-startle (lights-on): average activity in the 29-s post-stimulus window — signed −log10(p) (mutant vs WT)"
       on_avg_stim1: "Visual-startle (lights-on): average response to stimulus #1 — signed −log10(p) (mutant vs WT)"
       on_avg_post1: "Visual-startle (lights-on): average post-stimulus activity after stimulus #1 — signed −log10(p) (mutant vs WT)"
       on_avg_stimvpost: "Visual-startle (lights-on): mean difference between stimulus response and post-stimulus activity — signed −log10(p) (mutant vs WT)"
       on_avg_stim5: "Visual-startle (lights-on): average response to stimulus #5 (habituation endpoint) — signed −log10(p) (mutant vs WT)"
       off_avg_stim: "Visual-startle (lights-off): average response across all 5 stimuli — signed −log10(p) (mutant vs WT)"
       off_avg_post: "Visual-startle (lights-off): average activity in the 29-s post-stimulus window — signed −log10(p) (mutant vs WT)"
       off_avg_stim1: "Visual-startle (lights-off): average response to stimulus #1 — signed −log10(p) (mutant vs WT)"
       off_avg_post1: "Visual-startle (lights-off): average post-stimulus activity after stimulus #1 — signed −log10(p) (mutant vs WT)"
       off_avg_stimvpost: "Visual-startle (lights-off): mean difference between stimulus response and post-stimulus activity — signed −log10(p) (mutant vs WT)"
       off_avg_stim5: "Visual-startle (lights-off): average response to stimulus #5 (habituation endpoint) — signed −log10(p) (mutant vs WT)"
    organism: Danio rerio (crispant mutants)
    organism_key: zebrafish
    in_path: HumanName_Baseline_behavior_pvalues_cleaned.csv
    separator: ","
    gene_mappings:
      - column_name: human_gene_name
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
