# OPEN QUESTION (resolve before promoting to config.yaml):
#   None — all columns confirmed from supplementary methods. Ready for
#   sign-off review.
#
# NOTE ON FOLD CHANGE SCALE:
#   Despite the column name "Fold change" (no "log2" prefix), the
#   Supplementary Methods state the DEG cutoff is "fold change >= 0.14
#   (10% difference)", and log2(1.10) ≈ 0.137 ≈ 0.14. The minimum
#   absolute value in the data is 0.1401, confirming this is log2 FC.
#   The bulk-deconvolution sheet (not ingested) explicitly names its
#   equivalent column "log2(FC)", providing cross-sheet confirmation.
#
# NOTE ON ROW COUNT:
#   The ticket estimated ~5K rows; the actual table has 692 rows
#   (513 unique genes, 17 cell types). The paper itself states
#   "692 differential expression events".
#
# NOTE ON CELL-TYPE VOCABULARY:
#   Velmeshev 2019 uses different abbreviations from Wamsley 2024.
#   Velmeshev excitatory subtypes are layer-named (L2/3, L4, L5/6,
#   L5/6-CC); Wamsley uses EXT_N_L<layer>. Inhibitory subtypes align
#   (IN-PV, IN-SST, IN-VIP) with minor naming differences. No mapping
#   is applied here; cell_type values are left as published.

