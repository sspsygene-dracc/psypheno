# ============================================================================
# Tables
# ============================================================================
tables:
  - table: velmeshev_2019_degs
    shortLabel: velmeshev_2019_degs
    mediumLabel: "Velmeshev 2019 - snRNA-seq DEGs in Postmortem Autism Cortex"
    longLabel: "Per-gene per-cell-type ASD-vs-control DEGs from postmortem cortex single-nucleus RNA-seq (Velmeshev et al. Science 2019)"
    description: >
      Differentially expressed genes (ASD vs. control) per cell type
      from single-nucleus RNA-seq of 15 ASD and 16 control postmortem
      cortex samples (prefrontal cortex + anterior cingulate cortex).
      692 differential expression events across 17 cell types
      (513 unique genes), selected at q < 0.05 and |log2FC| ≥ 0.14
      (~10% change). Cell types include upper-layer excitatory neuron
      subtypes (L2/3, L4, L5/6, L5/6-CC), inhibitory interneuron
      subtypes (IN-PV, IN-SST, IN-SV2C, IN-VIP), astrocyte subtypes
      (AST-FB, AST-PP), microglia, oligodendrocytes, OPCs, endothelial
      cells, and transitional neuron populations (Neu-NRGN-I/II,
      Neu-mat). Source: Supplementary Table S4, sheet "ASD_DEGs".

    source: "Velmeshev et al. 2019 Science, Supplementary Table S4 (ASD_DEGs sheet)"

    in_path: velmeshev_2019_degs.tsv
    separator: "\t"

    organism: "Homo sapiens (postmortem ASD + control neocortex, 31 donors)"
    organism_key: human
    assay: expression
    disease:
      - asd
    categories:
      - snRNA-seq
      - postmortem cortex
      - cell-type DEGs
      - ASD vs control

    links:
      - url: https://www.science.org/doi/10.1126/science.aav8130
        label: Velmeshev 2019 — Science article
      - url: https://www.science.org/doi/suppl/10.1126/science.aav8130/suppl_file/aav8130_table_s4.xls
        label: Science supplementary Table S4 (XLS)
      - url: https://autism.cells.ucsc.edu
        label: UCSC Autism Cell Browser (interactive single-cell data)
        description: Interactive browser for the snRNA-seq atlas described in this paper.
      - url: https://www.ncbi.nlm.nih.gov/sra/?term=PRJNA434002
        label: SRA — PRJNA434002 (raw reads)

    # No raw p-value in this table — only FDR q-value.
    fdr_column: q_value
    effect_column: fold_change

    gene_mappings:
      - column_name: gene
        link_table_name: gene
        species: human
        perturbed_or_target: target

    fieldLabels:
      gene: >
        HGNC gene symbol. Differentially expressed in ASD vs. control
        postmortem neocortex (Velmeshev et al. 2019, Science,
        Supplementary Table S4). ENSG ID preserved in the gene_id column.
      gene_id: >
        Ensembl gene ID (GRCh38) corresponding to the HGNC symbol in the
        gene column (Velmeshev et al. 2019, Supplementary Table S4).
      cell_type: >
        Brain cell type from snRNA-seq clustering (Velmeshev et al. 2019).
        17 categories: excitatory neuron subtypes by cortical layer
        (L2/3, L4, L5/6, L5/6-CC), inhibitory interneuron subtypes
        (IN-PV, IN-SST, IN-SV2C, IN-VIP), astrocyte subtypes
        (AST-FB fibrous, AST-PP protoplasmic), Microglia,
        Oligodendrocytes, OPC (oligodendrocyte progenitors),
        Endothelial, Neu-NRGN-I, Neu-NRGN-II (NRGN-expressing neurons),
        Neu-mat (maturing neurons). Abbreviations differ from Wamsley 2024.
      gene_biotype: >
        Ensembl gene biotype (e.g. protein_coding, lincRNA, antisense).
        639 of 692 events are protein-coding genes.
      fold_change: >
        Log2 fold change of gene expression in ASD vs. control nuclei
        within this cell type (Velmeshev et al. 2019, Supplementary
        Table S4; Supplementary Methods, "Differential expression
        analysis"). Positive = higher in ASD. Despite the column label
        "Fold change" in the original table (no "log2" prefix), the
        paper's stated cutoff of 0.14 for "10% difference" confirms
        log2 scale (log2(1.10) ≈ 0.137). Range: −0.82 to +0.84.
      sample_fold_change: >
        Sample-level log2 fold change: expression was first aggregated
        per sample ("bulkized"), then ASD/control fold changes were
        computed across sample means (Velmeshev et al. 2019,
        Supplementary Methods). Wider range than fold_change because
        it captures between-donor variability rather than per-nucleus
        averages. Positive = higher in ASD.
      q_value: >
        FDR q-value from the likelihood-ratio test (ASD diagnosis
        factor) within cell type (Velmeshev et al. 2019, Supplementary
        Methods). No raw p-value is provided in this table. DEGs were
        selected at q < 0.05.
      bulk_correlation: >
        Pearson correlation between this gene's fold change in
        single-nucleus data and in matched bulk RNA-seq
        (Parikshak et al. 2016 cohort) across the same samples
        (Velmeshev et al. 2019, Supplementary Methods). High
        correlation validates snRNA-seq signal against bulk
        transcriptomics.
      epilepsy_deg: >
        yes/no: whether this gene was also differentially expressed in
        epilepsy (non-ASD comparison used to distinguish ASD-specific
        from seizure-related changes; Velmeshev et al. 2019, Fig. 2
        and Supplementary Methods).
      gene_group: >
        Co-expression group (I–V) assigned to a subset of DEGs
        (124 of 692) based on cell-type specificity and directional
        patterns (Velmeshev et al. 2019, Fig. 2B). Group I = broadly
        dysregulated across cell types; Group V = most cell-type
        specific. Most DEGs are unassigned (blank).
      sfari_gene: >
        yes/no: whether this gene appears in the SFARI Gene ASD-
        associated gene database (Abrahams et al. 2013) as of the
        Velmeshev et al. 2019 analysis. 75 of 513 DEGs are SFARI genes
        (p = 1.9×10⁻¹⁷, hypergeometric test).
      satterstrom: >
        yes/no: whether this gene is among the 102 high-confidence ASD
        risk genes identified by whole-exome sequencing in Satterstrom
        et al. 2020 (Nature Genetics). Note: the Velmeshev 2019 paper
        predates the Satterstrom 2020 publication; the annotation was
        added to the supplementary table post-publication or refers to
        an earlier version of the gene list.
      sanders: >
        yes/no: whether this gene is among ASD risk genes from Sanders
        et al. (SPARK / MSSNG whole-genome sequencing cohorts)
        as referenced in Velmeshev et al. 2019.
      cell_type_specific: >
        yes/no: whether this gene is a cell-type-specific marker —
        i.e., among the top marker genes for its cell type vs. all
        other cell types (FDR < 0.05, |log2FC| ≥ 1 by MAST; Velmeshev
        et al. 2019, Supplementary Methods). 17% of DEGs show
        cell-type-specific expression.

    changelog:
      - date: "2026-05-26"
        message: "Initial data load from Science Supplementary Table S4, ASD_DEGs sheet (issue #198)."
