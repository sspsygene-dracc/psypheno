publication:
  authors:
    - Sharmila Banerjee-Basu
    - Alan Packer
  year: 2010
  journal: Disease Models & Mechanisms
  doi: 10.1242/dmm.005439
  pmid: "20212079"
  sspsygene_grants: []
maintainers:
  - name: Johannes Birgmeier
    email: jbirgmei@ucsc.edu
    date: "2025-11-28"
    comment: Initial table creation
  - name: Johannes Birgmeier
    email: jbirgmei@ucsc.edu
    date: "2026-05-05"
    comment: Standardized table titles, resolved Ensembl-ID columns to HGNC symbols at preprocess time, added column header tooltips and a /gene-parser link tooltip, and migrated preprocessing to the Pipeline framework.
tables:
  - table: sfari_animal_genes
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title, resolved Ensembl IDs to HGNC symbols at preprocess time, added column tooltips and a /gene-parser link tooltip."
    shortLabel: sfari_animal_model_genes
    mediumLabel: Banerjee-Basu 2010 - SFARI Curated Animal Model Genes for ASD
    longLabel: SFARI Gene animal model evidence for autism genes
    description:
      Curated animal model data for autism spectrum disorder candidate genes from SFARI Gene
      database. Includes functional evidence from rodent, zebrafish, and other model organism studies.
    source: "SFARI Gene database export (07-08-2025 release)"
    assay: curated
    fieldLabels:
      gene_symbol: "Gene symbol (HGNC) of the autism candidate gene. Original identifier preserved in gene_symbol_raw."
      gene_name: "Human-readable name of the autism candidate gene"
      status: "Curation status"
      model_species: "Animal-model organism (e.g. mouse, zebrafish, rat)"
      human_gene_score: "SFARI gene score (strength of ASD evidence)"
      human_syndromic: "Whether gene is linked to a syndromic form of ASD"
      syntenic: "Syntenic region conserved across species"
      number_of_models: "Number of animal models available"
      has_rescue_model: "Whether a rescue model exists"
    links:
      - url: https://gene.sfari.org
        label: SFARI Gene database
    categories:
      - curated database
      - autism genetics
      - animal models
    organism: Multiple model organisms
    in_path: SFARI-Gene_animal-genes_07-08-2025release_10-03-2025export.csv
    separator: ","
    gene_mappings:
      - column_name: gene-symbol
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
  - table: sfari_animal_rescues
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title, resolved Ensembl IDs to HGNC symbols at preprocess time, added column tooltips and a /gene-parser link tooltip."
    shortLabel: sfari_animal_rescue_models
    mediumLabel: Banerjee-Basu 2010 - SFARI Curated Animal Rescue Models for ASD
    longLabel: SFARI Gene animal rescue experiment data
    description:
      Curated rescue experiment data showing genetic or pharmacological interventions that ameliorate
      autism-related phenotypes in animal models. Maps rescue strategies to ASD candidate genes.
    source: "SFARI Gene database export (07-08-2025 release)"
    assay: curated
    fieldLabels:
      model_symbol: "Gene symbol (HGNC) of the gene perturbed in the animal model (the autism candidate's ortholog). Original identifier in model_symbol_raw."
      status: "Curation status"
      model_id: "SFARI model identifier"
      model_species: "Animal-model organism (e.g. mouse, zebrafish, rat)"
      model_type: "Type of animal model (genetic, rescue, inbred, CNV, induced)"
      rescue_type: "Type of rescue intervention"
      rescue_agent: "Rescue agent or compound used"
      number_of_rescue_models: "Number of rescue models"
      parent_model_name: "Name of the parent animal model"
    links:
      - url: https://gene.sfari.org
        label: SFARI Gene database
    categories:
      - curated database
      - autism genetics
      - therapeutic targets
    organism: Multiple model organisms
    in_path: SFARI-Gene_animal-rescues_07-08-2025release_10-03-2025export.csv
    separator: ","
    gene_mappings:
      - column_name: model-symbol
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
  - table: sfari_human_genes
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title, resolved Ensembl IDs to HGNC symbols at preprocess time, added column tooltips and a /gene-parser link tooltip."
    shortLabel: sfari_human_gene_scores
    mediumLabel: Banerjee-Basu 2010 - SFARI Curated Human Gene Scores for ASD
    longLabel: SFARI Gene human genetic evidence and scoring
    description:
      Curated human genetic evidence for autism spectrum disorder candidate genes with assigned
      confidence scores. Aggregates de novo mutations, inherited variants, and functional data.
    source: "SFARI Gene database export (07-08-2025 release)"
    assay: curated
    fieldLabels:
      gene_symbol: "Gene symbol (HGNC) of the SFARI autism candidate gene. Original identifier in gene_symbol_raw."
      gene_name: "Human-readable name of the SFARI autism candidate gene"
      chromosome: "Chromosome on which the gene is located"
      status: "Curation status"
      ensembl_id: "Human symbol resolved from Ensembl gene ID (raw ID in ensembl_id_raw)"
      ensembl_id_raw: "Original Ensembl gene ID (pre-resolution)"
      genetic_category: "Genetic evidence category"
      gene_score: "SFARI gene score (1=high confidence, 2=strong candidate, 3=suggestive evidence)"
      syndromic: "Whether gene is linked to a syndromic form of ASD"
      eagle: "EAGLE automated gene scoring"
      number_of_reports: "Number of publications reporting this gene"
    links:
      - url: https://gene.sfari.org
        label: SFARI Gene database
    categories:
      - curated database
      - autism genetics
      - human genetics
    organism: Homo sapiens
    organism_key: human
    in_path: SFARI-Gene_genes_07-08-2025release_10-03-2025export_cleaned.csv
    separator: ","
    gene_mappings:
      - column_name: gene-symbol
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
        # Antisense-RNA / lincRNA labels with no current HGNC entry.
        # Each gets a manually_added=1 central_gene stub.
        non_resolving:
          record_values:
            - MSNP1AS
            - RPS10P2-AS1
