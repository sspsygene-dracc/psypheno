tables:
  - table: zebra_asd
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title (full surname Weinschutz Mendes; organism corrected to stable mutants) and added column header tooltips."
    shortLabel: zebrafish_asd_functional_screen
    mediumLabel: Weinschutz Mendes 2023 - in vivo Functional Screen of 10 ASD Risk Genes in Zebrafish
    longLabel: High-throughput in vivo screen of autism risk genes in zebrafish
    description:
      Parallel functional analysis of 10 autism spectrum disorder risk genes in zebrafish, measuring
      behavioral, structural, and circuit-level phenotypes. Identifies convergence on dopaminergic and neuroimmune
      pathways across ASD gene perturbations.
    source: "Table S4"
    assay: behavior
    disease: ["asd", "ndd"]
    fieldLabels:
      mutant_experiment_sample: "Combined identifier: mutant gene + experiment + genotype (HOM/HET/WT) + larva replicate"
      mutant_experiment_sample_gene: "Zebrafish mutant gene symbol — the first token of mutant_experiment_sample, mapped to its human ortholog."
      mutant_experiment_sample_gene_idx: "Experiment + sample suffix — everything after the first underscore of mutant_experiment_sample (e.g. 'HOM_3' from 'CHD8_HOM_3')."
      forebrain: "Forebrain pERK/tERK ratio — neural-activity readout (phosphorylated ERK normalized by total ERK) at 6 dpf"
      optic_tectum: "Optic tectum pERK/tERK ratio (neural activity at 6 dpf)"
      thalamus: "Thalamus pERK/tERK ratio (neural activity at 6 dpf)"
      hypothalamus: "Hypothalamus pERK/tERK ratio (neural activity at 6 dpf)"
      cerebellum: "Cerebellum pERK/tERK ratio (neural activity at 6 dpf)"
      hindbrain: "Hindbrain pERK/tERK ratio (neural activity at 6 dpf)"
      habenula: "Habenula pERK/tERK ratio (neural activity at 6 dpf)"
      posterior_tuberculum: "Posterior tuberculum pERK/tERK ratio (neural activity at 6 dpf; dopaminergic region)"
    links:
      - url: https://www.sciencedirect.com/science/article/pii/S2211124723002541?via%3Dihub#app2
        label: Cell Reports — supplementary materials
    categories:
      - functional genomics
      - behavior
      - whole-organism screening
      - autism genetics
    organism: Danio rerio
    organism_key: zebrafish
    in_path: 1-s2.0-S2211124723002541-mmc5_cleaned.txt
    separator: "\t"
    gene_mappings:
      - column_name: Mutant_Experiment_Sample_gene
        link_table_name: Mutant_Experiment_Sample_gene
        species: human
        perturbed_or_target: perturbed
  - table: RestWake_VisStart_byGene
    changelog:
      - date: "2026-02-23"
        message: "Initial data load"
      - date: "2026-05-05"
        message: "Standardized title (full surname Weinschutz Mendes) and added column header tooltips."
    shortLabel: mutant_behavior_rest_wake_visual_startle
    mediumLabel: Weinschutz Mendes 2023 - Sleep-Wake and Visual-Startle Behavior in 10 ASD Zebrafish Mutants
    source: "Supplemental Table S2, Related to Figure 2"
    longLabel: "Sleep-wake and Visual-Startle Parameters in Zebrafish Mutants of 10 ASD Genes"
    description:
        "Experimental setup and behavioral assays. Visual-startle: Larvae are exposed to
        five 1-s flashes of lights-off or -on stimuli at 29-s intervals at 5 dpf. Sleep-wake:
        Larvae are exposed to a 14 h:10 h white light:dark schedule at 5–7 dpf."
    links:
      - url: https://ars.els-cdn.com/content/image/1-s2.0-S2211124723002541-mmc3.xlsx
        label: Supplementary Table S2 (mmc3.xlsx)
    categories:
      - mutant zebrafish
      - behavioral fingerprints
    assay: behavior
    disease: ["asd", "ndd"]
    fieldLabels:
      human_gene_name: "Human ortholog gene symbol (the ASD risk gene whose zebrafish ortholog was mutated)"
      mutant_line: "Zebrafish mutant line and genotype (e.g. 'HET: chd8_del5' = heterozygous chd8 deletion line del5)"
      behavioral_parameter: "Behavioral assay parameter: 'Rest-Wake:…' for sleep-wake measurements at 5–7 dpf; 'Visual-Startle:…' for response to flashes at 5 dpf"
      wt_mean: "Mean of the behavioral parameter across background-matched wild-type larvae"
      wt_sd: "Standard deviation of the behavioral parameter across wild-type larvae"
      mutant_mean: "Mean of the behavioral parameter across mutant larvae"
      mutant_sd: "Standard deviation of the behavioral parameter across mutant larvae"
      beta: "Linear mixed-model regression coefficient for the mutation effect on this behavior (mutant minus wild-type, on the parameter's native scale)"
      pvalue: "Nominal p-value for the mutation effect from the linear mixed model"
    organism: Danio rerio (stable mutants)
    organism_key: zebrafish
    in_path: RestWake_VisStart_byGene.csv
    separator: ","
    gene_mappings:
      - column_name: human_gene_name
        link_table_name: gene
        species: human
        perturbed_or_target: perturbed
    pvalue_column: Pvalue
    effect_column: Beta
