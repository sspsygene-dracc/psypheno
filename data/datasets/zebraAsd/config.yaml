tables:
  - table: zebra_asd
    changelog:
      - date: "2025-10-06"
        message: "Initial data load"
    shortLabel: zebrafish_asd_functional_screen
    mediumLabel: Zebrafish ASD Functional Screen
    longLabel: High-throughput in vivo screen of autism risk genes in zebrafish
    description:
      Parallel functional analysis of 10 autism spectrum disorder risk genes in zebrafish, measuring
      behavioral, structural, and circuit-level phenotypes. Identifies convergence on dopaminergic and neuroimmune
      pathways across ASD gene perturbations.
    source: "Table S4"
    assay: behavior
    disease: ["asd", "ndd"]
    fieldLabels:
      mutant_experiment_sample: "Mutant/experiment/genotype/replicate identifier"
      forebrain: "Forebrain pERK/tERK activity ratio"
      optic_tectum: "Optic tectum pERK/tERK activity ratio"
      thalamus: "Thalamus pERK/tERK activity ratio"
      hypothalamus: "Hypothalamus pERK/tERK activity ratio"
      cerebellum: "Cerebellum pERK/tERK activity ratio"
      hindbrain: "Hindbrain pERK/tERK activity ratio"
      habenula: "Habenula pERK/tERK activity ratio"
      posterior_tuberculum: "Posterior tuberculum pERK/tERK activity ratio"
    links:
      - https://www.sciencedirect.com/science/article/pii/S2211124723002541?via%3Dihub#app2
    categories:
      - functional genomics
      - behavior
      - whole-organism screening
      - autism genetics
    organism: Danio rerio
    in_path: 1-s2.0-S2211124723002541-mmc5.txt
    split_column_map:
      - source_col: Mutant_Experiment_Sample
        new_col1: _Mutant_Experiment_Sample_gene
        new_col2: _Mutant_Experiment_Sample_gene_idx
        sep: _
    separator: "\t"
    gene_mappings:
      - column_name: _Mutant_Experiment_Sample_gene
        link_table_name: Mutant_Experiment_Sample_gene
        species: human
        to_upper: true
        replace:
          SCN1LAB: SCN1A
        is_perturbed: false
        is_target: false
  - table: RestWake_VisStart_byGene
    changelog:
      - date: "2026-02-23"
        message: "Initial data load"
    shortLabel: mutant_behavior_rest_wake_visual_startle
    mediumLabel: Mutant behavior rest-wake and visual-startle
    source: "Supplemental Table S2, Related to Figure 2"
    longLabel: "Sleep-wake and Visual-Startle Parameters in Zebrafish Mutants of 10 ASD Genes"
    description:
        "Experimental setup and behavioral assays. Visual-startle: Larvae are exposed to
        five 1-s flashes of lights-off or -on stimuli at 29-s intervals at 5 dpf. Sleep-wake:
        Larvae are exposed to a 14 h:10 h white light:dark schedule at 5–7 dpf."
    links:
      - https://ars.els-cdn.com/content/image/1-s2.0-S2211124723002541-mmc3.xlsx
    categories:
      - mutant zebrafish
      - behavioral fingerprints
    assay: behavior
    disease: ["asd", "ndd"]
    fieldLabels:
      human_gene_name: "Human Gene Name"
      mutant_line: "Mutant Zebrafish line"
      behavioral_parameter: "Behavioral data captured in either rest-wake or visual-startle tests"
      wt_mean: "Mean for Wild-type Data"
      wt_sd: "Standard Deviation for Wild-type Data"
      mutant_mean: "Mean for Mutant Data"
      mutant_sd: "Standard Deviation for Mutant Data"
      beta: "The change in the outcome variable (phenotype/expression) associated with having the mutation"
      pvalue: "Nominal p-value"
    organism: Danio rerio (crispant mutants)
    in_path: RestWake_VisStart_byGene.csv
    separator: ","
    split_column_map: []
    gene_mappings:
      - column_name: human_gene_name
        link_table_name: gene
        species: human
        ignore_missing: []
        is_perturbed: false
        is_target: false
    pvalue_column: Pvalue
