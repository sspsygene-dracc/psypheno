      - scRNA-seq
      - brain organoids
    organism: Homo sapiens (organoids)
    in_path: nebula_gene_0.2_FDR.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: gene_symbol
        link_table_name: gene
        species: human
        ignore_missing: []
        is_perturbed: false
        is_target: false
        replace:
          TBCE.1: TBCE
          MATR3.1: MATR3
          HSPA14.1: HSPA14
          TMSB15B.1: TMSB15B
          CYB561D2.1: CYB561D2
  - table: brain_organoid_atlas_S10
    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: full_nebula_gene_list
    mediumLabel: Wang 2025 - Full NEBULA Gene List
    longLabel: Complete list of differentially expressed genes from NEBULA analysis
    description:
      Comprehensive gene-level screen showing all differentially expressed genes across brain
      organoid subclasses and neurodevelopmental disease categories using single-cell NEBULA analysis.
    source: "Table S10"
    assay: expression
    disease: ["ndd"]
    fieldLabels:
      disease: "NDD disease category"
    categories:
      - differential expression
      - scRNA-seq
      - gene screens
    organism: Homo sapiens (organoids)
    in_path: s10.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: gene_symbol
        link_table_name: gene
        species: human
        ignore_missing: []
        is_perturbed: false
        is_target: false
        replace:
          TBCE.1: TBCE
          CYB561D2.1: CYB561D2
          MATR3.1: MATR3
          HSPA14.1: HSPA14
          TMSB15B.1: TMSB15B
          ARMCX5-GPRASP2.1: ARMCX5-GPRASP2
    pvalue_column: pvalue
    fdr_column: FDR
  - table: brain_organoid_atlas_S11
    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: pseudobulk_validation_genes
    mediumLabel: Wang 2025 - Pseudobulk Validation Genes
    longLabel: Selected validation genes from cell subclass pseudobulk analysis
    description:
      Wilcoxon test results for selected genes across cell subclass pseudobulk comparisons, providing
      validation of single-cell differential expression findings with FDR-adjusted p-values.
    source: "Table S11"
    assay: expression
    disease: ["ndd"]
    fieldLabels:
      diagnosis: "NDD diagnosis category"
      statistic: "Wilcoxon test statistic"
      p: "Nominal p-value"
      p_adjust: "Adjusted p-value"
    categories:
      - differential expression
      - pseudobulk RNA-seq
      - validation
    organism: Homo sapiens (organoids)
    in_path: Table_8_Selected_validate_genes.txt
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: gene
        link_table_name: gene
        species: human
        ignore_missing: []
        is_perturbed: false
        is_target: false
