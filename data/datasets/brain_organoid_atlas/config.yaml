  - table: brain_organoid_atlas_S11
    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: pseudobulk_validation_genes
    mediumLabel: Wang 2025 - Pseudobulk Validation Genes
    longLabel: Selected validation genes from cell subclass pseudobulk analysis
    description:
      Wilcoxon test results for selected genes across cell subclass pseudobulk comparisons, providing
      validation of single-cell differential expression findings with FDR-adjusted p-values.
    source: "Table S11"
    assay: expression
    disease: ["ndd"]
    fieldLabels:
      gene: "Gene symbol (HGNC)"
      diagnosis: "NDD diagnosis category: MIC=microcephaly, PMG=polymicrogyria, EPI=epilepsy, ID=intellectual disability"
      cell_type: "Brain organoid cell type cluster"
      statistic: "Wilcoxon rank-sum test statistic (pseudobulk: patient samples vs neurotypical control samples)"
      p: "Nominal p-value from the Wilcoxon rank-sum test"
      p_adjust: "Benjamini–Hochberg FDR-adjusted p-value"
    categories:
