tables:
  - table: brain_organoid_atlas_patient_list
    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: ndd_patient_list
    mediumLabel: Wang 2025 - NDD Patient List
    longLabel: Brain organoid atlas patient metadata with pathogenic variants
    description:
      Patient-level metadata linking individuals with neurodevelopmental disorders to their pathogenic
      causative mutations and brain organoid lines. Includes clinical details for microcephaly, polymicrogyria,
      epilepsy, and intellectual disability cases.
    source: "Table S1"
    fieldLabels:
      ipsc_line: "Identifier for the patient-derived induced pluripotent stem cell line used to grow the organoid"
      sex: "Patient biological sex (M = male, F = female)"
      category: "NDD disease category (MIC=microcephaly, PMG=polymicrogyria, EPI=epilepsy, ID=intellectual disability)"
      pathologic_causative_mutation: "Causative gene mutation"
      mutation_genome_information_hg19_: "Genomic coordinates (hg19)"
      hc_at_birth_sd_: "Head circumference at birth (SD)"
      onset: "Age of seizure onset"
      frequency: "Seizure frequency"
      cognitive_functions: "Cognitive function assessment"
      cerebral_cortex: "Cerebral cortex phenotype"
      ventriculo_megaly: "Ventriculomegaly presence/severity"
      white_matter: "White matter abnormalities"
      diameter_of_hbos_div28_and_80_in_mm_: "Brain organoid diameter at DIV28 and DIV80 (mm)"
      neural_rosettes: "Neural rosette formation"
      lamination_layers_: "Cortical layer lamination"
    categories:
      - patient metadata
      - neurodevelopmental disorders
      - iPSC lines
    organism: Homo sapiens
    organism_key: human
    in_path: patient_list.tsv
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: Pathologic causative mutation
        link_table_name: gene
        species: human
        ignore_missing:
          - not_available
          - none identified
        perturbed_or_target: perturbed
  - table: brain_organoid_atlas_nebula_gene_0_05_FDR
    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: nebula_degs_fdr_005
    mediumLabel: Wang 2025 - NEBULA DEGs (FDR 0.05)
    longLabel: NEBULA differential expression analysis at 0.05 FDR threshold
    description:
      Differentially expressed genes identified using NEBULA (negative binomial mixed model)
      in brain organoids from neurodevelopmental disorder patients at stringent FDR threshold of 0.05.
    source: "Table S10 (filtered, FDR < 0.05)"
    assay: expression
    disease: ["ndd"]
    fieldLabels:
      cell_type: "Brain organoid cell type cluster (e.g. oRG = outer radial glia, GABA neurons, Astroglia, vGlut-1 neurons)"
      gene_symbol: "Gene symbol (HGNC)"
      disease: "NDD disease category: MIC=microcephaly, PMG=polymicrogyria, EPI=epilepsy, ID=intellectual disability"
      pvalue: "Nominal p-value from the NEBULA negative-binomial mixed-model test (patient organoids vs neurotypical control organoids)"
      fdr: "Benjamini–Hochberg FDR-adjusted p-value"
      logfc: "Natural-log fold change in expression: NDD-patient organoids vs neurotypical control organoids, in this cell type. Positive = upregulated in patients."
    categories:
      - differential expression
      - scRNA-seq
      - brain organoids
    organism: Homo sapiens (organoids)
    organism_key: human
    in_path: nebula_gene_0.05_FDR.txt
    split_column_map: []
    separator: "\t"
    gene_mappings:
      - column_name: gene_symbol
        link_table_name: gene
        species: human
        ignore_missing: []
        perturbed_or_target: target
        replace:
          TBCE.1: TBCE
          MATR3.1: MATR3
          HSPA14.1: HSPA14
          TMSB15B.1: TMSB15B
          CYB561D2.1: CYB561D2
    pvalue_column: pvalue
    fdr_column: FDR
    effect_column: logFC
