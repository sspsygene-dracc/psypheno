    changelog:
      - date: "2025-11-05"
        message: "Initial data load"
    shortLabel: nebula_degs_fdr_02
    mediumLabel: Wang 2025 - NEBULA DEGs (FDR 0.2)
    longLabel: NEBULA differential expression analysis at 0.2 FDR threshold
    description:
      Differentially expressed genes identified using NEBULA in brain organoids from neurodevelopmental
      disorder patients at relaxed FDR threshold of 0.2, capturing additional candidate genes.
    source: "Table S10 (filtered, FDR < 0.2)"
